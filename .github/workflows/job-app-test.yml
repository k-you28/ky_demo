name: Job App CI Test

on:
  pull_request:
    branches: ["main"]
    paths:
      - "job-application-tracker/**"
  push:
    branches: ["main"]
    paths:
      - "job-application-tracker/**"
  workflow_dispatch:

concurrency:
  group: job-app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Job App Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: job-application-tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit + integration tests
        run: ./gradlew --no-daemon clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-app-test-reports
          path: |
            job-application-tracker/build/reports/tests/test
            job-application-tracker/build/test-results/test
