<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>View Application - Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div>
        <h1>Application Details</h1>
        <p>Everything logged for this role in one place.</p>
      </div>
    </section>

    <p th:if="${error}" class="notice error" th:text="${error}">Error</p>

    <section class="panel" th:if="${application}">
      <dl class="detail-grid">
        <dt>Company</dt>
        <dd th:text="${application.companyName}">-</dd>

        <dt>Position</dt>
        <dd th:text="${application.positionTitle}">-</dd>

        <dt>Date Applied</dt>
        <dd th:text="${application.dateApplied}">-</dd>

        <dt>Status</dt>
        <dd>
          <span class="status-badge" th:classappend="' status-' + ${#strings.toLowerCase(application.status)}" th:text="${application.status}">Status</span>
        </dd>

        <dt>Source</dt>
        <dd th:text="${application.source} ?: '-'">-</dd>

        <dt>Notes</dt>
        <dd th:text="${application.notes} ?: '-'">-</dd>

        <dt>Request Key</dt>
        <dd th:text="${application.requestKey}">-</dd>
      </dl>
    </section>

    <div class="toolbar" style="margin-top: 0.9rem;">
      <a href="/" class="btn btn-secondary">Back To List</a>
    </div>
  </main>
</body>
</html>
