<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add Application - Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div>
        <h1>Add Job Application</h1>
        <p>Capture the essentials now so follow-ups are easier later.</p>
      </div>
    </section>

    <p th:if="${error}" class="notice error" th:text="${error}">Error</p>

    <section class="panel">
      <form method="post" action="/add" th:object="${application}" class="form-grid">
        <div>
          <label>Company Name *</label>
          <input type="text" th:field="*{companyName}" required/>
        </div>

        <div>
          <label>Position Title *</label>
          <input type="text" th:field="*{positionTitle}" required/>
        </div>

        <div>
          <label>Date Applied *</label>
          <input type="date" th:field="*{dateApplied}" required/>
        </div>

        <div>
          <label>Status</label>
          <select th:field="*{status}">
            <option value="APPLIED">Applied</option>
            <option value="INTERVIEWING">Interviewing</option>
            <option value="OFFER">Offer</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>

        <div>
          <label>Source</label>
          <input type="text" th:field="*{source}" placeholder="LinkedIn, Referral, Company Site"/>
        </div>

        <div>
          <label>Notes</label>
          <textarea th:field="*{notes}" rows="4" placeholder="Recruiter name, next steps, salary range, timeline..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Save Application</button>
          <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
