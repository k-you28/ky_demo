name: CD Deploy

on:
  workflow_run:
    workflows: ["CI Test"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cd-deploy-main
  cancel-in-progress: true

jobs:
  publish-and-deploy:
    name: Publish Image and Optional Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Checkout (workflow_run SHA)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Skip deploy (no webhook configured)
        if: env.DEPLOY_WEBHOOK_URL == ''
        run: echo "DEPLOY_WEBHOOK_URL is not set. Skipping deployment."

      - name: Trigger deployment webhook
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
